kind = "web"
previewPath = "/"
title = "The Foundation"
version = "1.0.0"
id = "artifacts/the-foundation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21086

[services.development]
run = "pnpm --filter @workspace/the-foundation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-foundation", "run", "build" ]
publicDir = "artifacts/the-foundation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21086"
BASE_PATH = "/"
